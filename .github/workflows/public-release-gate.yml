name: Public Release Gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  approval:
    name: Fail-closed approval check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check public release approval
        run: python scripts/public_release_gate.py
