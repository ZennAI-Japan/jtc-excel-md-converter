<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">JTC Excel MD Converter</title>
  <desc id="desc">Office documents converted into Markdown, JSON, warnings, preview HTML, and ZIP package.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132b46"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f1e4"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="90" r="220" fill="#f2b84b" opacity="0.16"/>
  <circle cx="120" cy="570" r="210" fill="#7cc7d8" opacity="0.12"/>

  <text x="86" y="106" fill="#f8f1e4" font-family="Arial, 'Hiragino Sans', sans-serif" font-size="34" font-weight="700">JTC Excel MD Converter</text>
  <text x="86" y="158" fill="#f2b84b" font-family="Arial, 'Hiragino Sans', sans-serif" font-size="56" font-weight="800">Office文書をAIが読める仕様書へ</text>
  <text x="88" y="206" fill="#d8e6ef" font-family="Arial, 'Hiragino Sans', sans-serif" font-size="26">Word / Excel / PDF → Markdown + JSON + Review HTML</text>

  <g filter="url(#shadow)">
    <rect x="86" y="260" width="350" height="250" rx="28" fill="url(#card)"/>
    <text x="118" y="312" fill="#12263c" font-family="Arial, 'Hiragino Sans', sans-serif" font-size="24" font-weight="700">入力</text>
    <rect x="118" y="342" width="286" height="132" rx="14" fill="#ffffff" stroke="#d7c9ad"/>
    <line x1="142" y1="375" x2="380" y2="375" stroke="#93a3b5" stroke-width="3"/>
    <line x1="142" y1="410" x2="380" y2="410" stroke="#93a3b5" stroke-width="3"/>
    <line x1="210" y1="350" x2="210" y2="466" stroke="#93a3b5" stroke-width="3"/>
    <line x1="300" y1="350" x2="300" y2="466" stroke="#93a3b5" stroke-width="3"/>
    <text x="140" y="455" fill="#4e647b" font-family="Arial, 'Hiragino Sans', sans-serif" font-size="18">罫線・結合セル・入力規則</text>
  </g>

  <path d="M470 385 C530 385, 550 385, 610 385" stroke="#f2b84b" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M590 358 L628 385 L590 412" fill="none" stroke="#f2b84b" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="665" y="240" width="430" height="300" rx="28" fill="#0f2034" stroke="#f2b84b" stroke-width="2"/>
    <text x="700" y="294" fill="#f8f1e4" font-family="Arial, 'Hiragino Sans', sans-serif" font-size="24" font-weight="700">出力</text>
    <text x="700" y="344" fill="#7ee0b2" font-family="Menlo, Consolas, monospace" font-size="28"># 画面設計書</text>
    <text x="700" y="388" fill="#d8e6ef" font-family="Menlo, Consolas, monospace" font-size="22">- book_specification.md</text>
    <text x="700" y="424" fill="#d8e6ef" font-family="Menlo, Consolas, monospace" font-size="22">- extracted.json</text>
    <text x="700" y="460" fill="#d8e6ef" font-family="Menlo, Consolas, monospace" font-size="22">- preview.html</text>
    <text x="700" y="496" fill="#d8e6ef" font-family="Menlo, Consolas, monospace" font-size="22">- warnings.md</text>
  </g>

  <text x="86" y="580" fill="#9fb4c7" font-family="Arial, 'Hiragino Sans', sans-serif" font-size="22">ローカルファースト / Docker対応 / AI連携は任意</text>
</svg>
